<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARRICK 26/27 | UNSTOPPABLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --manc-red: #ff0000;
            --glow: 0 0 25px rgba(255, 0, 0, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: #020202;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Top Border Glow */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--manc-red);
            box-shadow: var(--glow);
            z-index: 100;
        }

        .header {
            text-align: center;
            margin: 60px 0 40px;
        }

        .carrick-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(3.5rem, 12vw, 6rem);
            letter-spacing: -5px;
            margin: 0;
            text-transform: uppercase;
            line-height: 0.8;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }

        .stamp {
            display: inline-block;
            border: 8px solid var(--manc-red);
            padding: 10px 40px;
            color: var(--manc-red);
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            transform: rotate(-7deg) translateY(-10px);
            box-shadow: var(--glow);
            margin-top: 25px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.8);
        }

        /* Stats Card */
        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            width: 100%;
            max-width: 650px;
            padding: 60px 40px;
            border-radius: 4px;
            text-align: center;
            margin-top: 20px;
        }

        #counter {
            font-size: clamp(4.5rem, 15vw, 7.5rem);
            font-weight: 900;
            letter-spacing: -6px;
            margin: 0;
            line-height: 0.9;
        }

        .label {
            color: #555;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 4px;
            margin: 10px 0 40px;
            text-transform: uppercase;
        }

        .bar-container { width: 100%; position: relative; }
        .goal-text { display: flex; justify-content: space-between; color: var(--manc-red); font-weight: 900; font-size: 0.9rem; margin-bottom: 10px; }
        .bar-bg { width: 100%; height: 12px; background: #151515; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--manc-red); width: 100% !important; box-shadow: var(--glow); }

        /* The Button */
        .btn {
            width: 100%;
            max-width: 650px;
            background: var(--manc-red);
            color: white;
            border: none;
            padding: 30px;
            font-size: 1.8rem;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.2);
        }

        .btn:hover { background: #ff1a1a; transform: scale(1.01); box-shadow: 0 20px 50px rgba(255, 0, 0, 0.4); }
        .btn.signed { background: #111; color: #333; cursor: default; transform: none; box-shadow: none; }

        /* Bot Activity Feed */
        .activity-box {
            width: 100%;
            max-width: 650px;
            margin-top: 50px;
            border-top: 1px solid #111;
            padding-top: 30px;
        }

        .activity-header {
            font-size: 0.8rem;
            font-weight: 900;
            color: #333;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-align: center;
        }

        .comment {
            background: rgba(255,255,255,0.01);
            margin-bottom: 8px;
            padding: 15px;
            border-radius: 4px;
            font-size: 0.95rem;
            border-left: 3px solid transparent;
            animation: fadeIn 0.5s ease forwards;
        }

        .comment.new { border-left-color: var(--manc-red); background: rgba(255,0,0,0.03); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot-name { color: var(--manc-red); font-weight: 900; margin-right: 10px; }
        .bot-msg { color: #888; }

        .footer { margin: 80px 0 40px; color: #1a1a1a; font-size: 0.8rem; font-weight: 900; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="carrick-title">CARRICK</h1>
        <div class="stamp">KEEP HIM</div>
    </div>

    <div class="card">
        <h2 id="counter">0</h2>
        <div class="label">MANCUNIANS SIGNED</div>

        <div class="bar-container">
            <div class="goal-text">
                <span>100.00% of goal</span>
                <span>150,000 GOAL</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
        </div>
    </div>

    <button id="signBtn" class="btn">SIGN THE PETITION</button>

    <div class="activity-box">
        <div class="activity-header">LIVE ACTIVITY FEED</div>
        <div id="feed"></div>
    </div>

    <div class="footer">GLORY GLORY MAN UNITED</div>

    <script>
        const counterEl = document.getElementById('counter');
        const btn = document.getElementById('signBtn');
        const feed = document.getElementById('feed');

        // MATH: Jumps ~150-300 signs per refresh, blows past 150k
        const startTime = new Date("May 6, 2026 09:00:00").getTime();
        
        function getCount() {
            const now = new Date().getTime();
            const elapsed = (now - startTime) / 1000;
            // Starts at 168k and grows by 18.5 per second
            return Math.floor(168420 + (elapsed * 18.5));
        }

        let currentCount = getCount();

        function updateDisplay() {
            counterEl.innerText = currentCount.toLocaleString();
        }

        // Fast Live Ticking
        setInterval(() => {
            currentCount += Math.floor(Math.random() * 3);
            updateDisplay();
        }, 100);

        // BOT SYSTEM
        const users = ["MancUni", "RashyFan", "StretfordEnd88", "UnitedWay", "CarrickEra", "RedArmy", "GGMU_26", "TheaterOfDreams", "DevilNews"];
        const texts = ["Sign it now!", "We need him for 26/27.", "The board better listen.", "Carrick is cooking.", "Don't kill the progress.", "Just signed from Salford!", "Stay Michael!", "He's the one."];

        function spawnComment(isUser = false) {
            const div = document.createElement('div');
            div.className = 'comment' + (isUser ? ' new' : '');
            
            const name = isUser ? "YOU" : users[Math.floor(Math.random() * users.length)];
            const msg = isUser ? "JUST SIGNED THE PETITION!" : texts[Math.floor(Math.random() * texts.length)];
            
            div.innerHTML = `<span class="bot-name">${name}</span><span class="bot-msg">${msg}</span>`;
            
            feed.prepend(div);
            if (feed.children.length > 6) feed.removeChild(feed.lastChild);
        }

        btn.addEventListener('click', () => {
            if (!btn.classList.contains('signed')) {
                btn.innerText = "SIGNING...";
                setTimeout(() => {
                    currentCount += 450;
                    updateDisplay();
                    btn.innerText = "YOU'VE ALREADY SIGNED";
                    btn.classList.add('signed');
                    localStorage.setItem('signed_carrick_26', 'true');
                    spawnComment(true);
                }, 800);
            }
        });

        if (localStorage.getItem('signed_carrick_26')) {
            btn.innerText = "YOU'VE ALREADY SIGNED";
            btn.classList.add('signed');
        }

        // Kick off bots
        updateDisplay();
        setInterval(spawnComment, 2000);
        for(let i=0; i<4; i++) spawnComment();
    </script>
</body>
</html>
