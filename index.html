<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARRICK 26/27 | THE FUTURE</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --manc-red: #ff0000;
            --bg-black: #050505;
            --card-bg: #0d0d0d;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Aggressive Vibe Header */
        .header-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .carrick-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3.5rem;
            letter-spacing: -3px;
            margin: 0;
            text-transform: uppercase;
            line-height: 0.8;
        }

        .keep-stamp {
            display: inline-block;
            border: 8px solid var(--manc-red);
            padding: 5px 30px;
            color: var(--manc-red);
            font-family: 'Archivo Black', sans-serif;
            font-size: 5rem;
            transform: rotate(-8deg) translateY(-10px);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            margin-top: 15px;
            text-transform: uppercase;
        }

        .manifesto {
            max-width: 420px;
            text-align: center;
            color: #777;
            font-size: 1rem;
            line-height: 1.4;
            margin: 30px 20px;
        }

        /* The Petition Card */
        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            padding: 40px 20px;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
            text-align: center;
        }

        #counter {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -4px;
            margin: 0;
            line-height: 1;
        }

        .label {
            color: #444;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .bar-bg {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .bar-fill {
            height: 100%;
            background: var(--manc-red);
            width: 0%;
            box-shadow: 0 0 20px var(--manc-red);
            transition: width 0.5s ease-out;
        }

        .goal-info {
            display: flex;
            justify-content: flex-end;
            color: var(--manc-red);
            font-weight: 900;
            font-size: 1rem;
        }

        /* The Button */
        .btn {
            width: 90%;
            max-width: 500px;
            background: var(--manc-red);
            color: white;
            border: none;
            padding: 22px;
            font-size: 1.4rem;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.3);
            transition: 0.2s;
        }

        .btn:hover { background: #ff3333; transform: scale(1.02); }
        .btn.signed { background: #111; color: #333; cursor: default; box-shadow: none; transform: none; }

        .footer { color: #222; margin-top: 30px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1 class="carrick-text">Carrick</h1>
        <div class="keep-stamp">Stay</div>
    </div>

    <p class="manifesto">
        The future is being built. Michael has restored the pride. Sign now to keep the vision alive for 26/27.
    </p>

    <div class="card">
        <h2 id="counter">0</h2>
        <div class="label">Mancunians Signed</div>

        <div class="goal-info">150,000 GOAL</div>
        <div class="bar-bg">
            <div class="bar-fill" id="progress"></div>
        </div>
    </div>

    <button id="signBtn" class="btn">Sign the Petition</button>

    <div class="footer">NO ACCOUNT NEEDED • BUILT FOR THE REDS</div>

    <script>
        const goal = 150000;
        const countEl = document.getElementById('counter');
        const barEl = document.getElementById('progress');
        const btn = document.getElementById('signBtn');

        // 1. BASE LOGIC: Calculate signs based on time
        // We set a "Start Date" (e.g., 1 hour ago)
        const startTime = new Date("May 6, 2026 12:00:00").getTime();
        
        function getLiveCount() {
            const now = new Date().getTime();
            const elapsedSeconds = Math.floor((now - startTime) / 1000);
            
            // This adds roughly 216 signs every minute (approx 3.6 per second)
            // Plus a base start of 85,000 so it's not empty
            let baseCount = 85432 + (elapsedSeconds * 3.6);
            
            // Limit it so it doesn't pass the goal too fast
            return Math.min(baseCount, goal);
        }

        let currentCount = getLiveCount();

        function updateUI() {
            countEl.innerText = Math.floor(currentCount).toLocaleString();
            let percent = (currentCount / goal) * 100;
            barEl.style.width = percent + "%";
        }

        // Increment the counter in real-time while they watch
        setInterval(() => {
            if (currentCount < goal) {
                currentCount += (Math.random() * 0.5); // Slow crawl while on page
                updateUI();
            }
        }, 200);

        btn.addEventListener('click', () => {
            if (!btn.classList.contains('signed')) {
                btn.innerText = "SIGNING...";
                setTimeout(() => {
                    currentCount += 1; 
                    updateUI();
                    btn.innerText = "YOU'VE ALREADY SIGNED";
                    btn.classList.add('signed');
                    localStorage.setItem('carrick_signed', 'true');
                }, 1000);
            }
        });

        if (localStorage.getItem('carrick_signed')) {
            btn.innerText = "YOU'VE ALREADY SIGNED";
            btn.classList.add('signed');
        }

        updateUI(); // Run immediately on load
    </script>
</body>
</html>
