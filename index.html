<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARRICK 26/27 | THE FUTURE IS RED</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --manc-red: #ff0000;
            --glow: 0 0 30px rgba(255, 0, 0, 0.6);
            --card-bg: #0a0a0a;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Top Red Accent */
        body::before {
            content: "";
            position: fixed;
            top: 0; width: 100%; height: 2px;
            background: var(--manc-red);
            box-shadow: var(--glow);
            z-index: 100;
        }

        .header { text-align: center; margin: 40px 0 20px; }
        
        .carrick-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(3.5rem, 15vw, 7.5rem);
            letter-spacing: -7px;
            margin: 0;
            text-transform: uppercase;
            line-height: 0.8;
            font-style: italic;
        }

        .stamp {
            display: inline-block;
            border: 10px solid var(--manc-red);
            padding: 10px 40px;
            color: var(--manc-red);
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 10vw, 4.5rem);
            transform: rotate(-6deg) translateY(-15px);
            box-shadow: var(--glow);
            margin-top: 20px;
            background: black;
        }

        /* Stats Section */
        .card {
            background: var(--card-bg);
            border: 1px solid #111;
            width: 100%;
            max-width: 750px;
            padding: 50px 30px;
            text-align: center;
            margin-top: 20px;
        }

        #counter {
            font-size: clamp(5.5rem, 20vw, 9.5rem);
            font-weight: 900;
            letter-spacing: -10px;
            margin: 0;
            line-height: 0.8;
            color: #fff;
        }

        .label {
            color: #333;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 6px;
            margin: 20px 0 40px;
            text-transform: uppercase;
        }

        .bar-bg { width: 100%; height: 12px; background: #111; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--manc-red); width: 100%; box-shadow: var(--glow); }

        /* User Interaction */
        .input-group {
            width: 100%;
            max-width: 750px;
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--manc-red); }

        .btn {
            background: var(--manc-red);
            color: white;
            border: none;
            padding: 0 40px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .main-sign-btn {
            width: 100%;
            max-width: 750px;
            padding: 30px;
            margin-top: 15px;
            font-size: 1.8rem;
        }

        .btn:hover { background: #ff3333; transform: scale(1.01); }
        .btn:active { transform: scale(0.98); }
        .btn.disabled { background: #111; color: #333; cursor: default; }

        /* Comment Section */
        .feed-container {
            width: 100%;
            max-width: 750px;
            margin-top: 50px;
        }

        .comment {
            background: #080808;
            padding: 20px;
            margin-bottom: 12px;
            border-left: 4px solid #151515;
            animation: slideUp 0.4s ease-out forwards;
        }

        .comment.user-post { border-left-color: var(--manc-red); background: rgba(255, 0, 0, 0.05); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .c-user { color: var(--manc-red); font-weight: 900; font-size: 0.85rem; letter-spacing: 1px; }
        .c-text { color: #ccc; margin-top: 8px; font-size: 1.05rem; }

        .footer { margin: 100px 0 50px; color: #1a1a1a; font-weight: 900; letter-spacing: 12px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="carrick-title">CARRICK</h1>
        <div class="stamp">KEEP 26/27</div>
    </div>

    <div class="card">
        <h2 id="counter">0</h2>
        <div class="label">UNITED WE STAND</div>
        <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>

    <div class="input-group">
        <input type="text" id="userComment" placeholder="Leave a message for the gaffer...">
        <button id="postBtn" class="btn">POST</button>
    </div>
    
    <button id="signBtn" class="btn main-sign-btn">SIGN PETITION</button>

    <div class="feed-container" id="feed"></div>

    <div class="footer">STRETFORD END</div>

    <script>
        const counterEl = document.getElementById('counter');
        const signBtn = document.getElementById('signBtn');
        const postBtn = document.getElementById('postBtn');
        const userInput = document.getElementById('userComment');
        const feed = document.getElementById('feed');

        // PERSISTENT COUNTER (Refreshes show massive growth)
        const startTime = new Date("May 6, 2026 04:00:00").getTime();
        function getLiveCount() {
            const now = new Date().getTime();
            const elapsed = (now - startTime) / 1000;
            // Starts way above 150k and gains ~32 per second
            return Math.floor(184250 + (elapsed * 32.7));
        }

        let currentCount = getLiveCount();
        function updateUI() { counterEl.innerText = currentCount.toLocaleString(); }

        // Live Ticking
        setInterval(() => {
            currentCount += Math.floor(Math.random() * 5);
            updateUI();
        }, 150);

        // HUMAN FAN VOICES
        const fanPool = [
            "He's got the DNA. This isn't a project, it's a takeover.",
            "Best tactical gaffer in the league. Look at that mid-block.",
            "Carrickball is peak. Keep him for 10 years.",
            "Signed. We aren't going backwards. Standards are high.",
            "I've seen enough. He's better than Pep already.",
            "Imagine letting him go now. Board needs to wake up.",
            "Top 3 finish with that squad? Gaffer is magic.",
            "Michael Carrick's Red Army! Stand up!",
            "Old Trafford finally feels like a fortress again.",
            "DNA. Trophies. Carrick. In that order."
        ];

        function createComment(name, text, isUser = false) {
            const div = document.createElement('div');
            div.className = `comment ${isUser ? 'user-post' : ''}`;
            div.innerHTML = `
                <div class="c-user">${name.toUpperCase()}</div>
                <div class="c-text">${text}</div>
            `;
            feed.prepend(div);
            if (feed.children.length > 8) feed.removeChild(feed.lastChild);
        }

        // Post button logic
        postBtn.addEventListener('click', () => {
            if (userInput.value.trim() !== "") {
                createComment("YOU", userInput.value, true);
                userInput.value = "";
            }
        });

        // Sign button logic
        signBtn.addEventListener('click', () => {
            if (!signBtn.classList.contains('disabled')) {
                signBtn.innerText = "SIGNING...";
                setTimeout(() => {
                    currentCount += 1250;
                    updateUI();
                    signBtn.innerText = "ALREADY SIGNED";
                    signBtn.classList.add('disabled');
                    localStorage.setItem('carrick_26_signed', 'true');
                    createComment("YOU", "JUST SIGNED. HE STAYS.", true);
                }, 800);
            }
        });

        if (localStorage.getItem('carrick_26_signed')) {
            signBtn.innerText = "ALREADY SIGNED";
            signBtn.classList.add('disabled');
        }

        // Random bot signs every few seconds
        setInterval(() => {
            const names = ["Manc_Red", "Utd_Loyal", "RedArmy99", "SirAlex_Vibe", "CarrickEra"];
            const name = names[Math.floor(Math.random()*names.length)];
            const text = fanPool[Math.floor(Math.random()*fanPool.length)];
            createComment(name, text);
        }, 3500);

        // Init
        updateUI();
        for(let i=0; i<4; i++) {
            createComment("United_News", fanPool[i]);
        }
    </script>
</body>
</html>
