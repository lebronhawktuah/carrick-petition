<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms - Horror Simulation</title>
    <script src="https://unpkg.com/three@r128/build/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0f0;
            font-size: 12px;
            z-index: 100;
            text-shadow: 0 0 4px rgba(0, 255, 0, 0.8);
            line-height: 1.8;
        }
        .stats {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            width: 220px;
        }
        #threat {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #f00;
            font-size: 12px;
            z-index: 100;
            text-shadow: 0 0 4px rgba(255, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            width: 220px;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }
        .loading-text {
            color: #0f0;
            margin-bottom: 20px;
            font-size: 14px;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.6);
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="loading">
        <div class="loading-text" id="loadMainText">CLICK ANYWHERE TO INITIALIZE SPATIAL MATRIX</div>
        <div class="loading-text" id="loadStatus" style="font-size: 11px; color: #666;">(Enables Audio & Pointer Lock)</div>
    </div>
    <div id="hud" class="stats">
        <div id="fps">FPS: 60</div>
        <div id="pos">POS: 0, 0, 0</div>
        <div id="chunk">CHUNK: 0, 0</div>
        <div id="quality">QUALITY: ULTRA</div>
        <div id="entities">ENTITIES: 0</div>
    </div>
    <div id="threat">
        <div id="threatLevel">THREAT: MINIMAL</div>
        <div id="distance">DISTANCE: ∞</div>
        <div id="status">STATUS: INIT</div>
    </div>

    <script>
        // ============================================================================
        // SIMPLE SEEDED RANDOM
        // ============================================================================
        class Random {
            constructor(seed) {
                this.seed = seed;
            }
            next() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            }
        }

        // ============================================================================
        // 1. CORE RENDERER SYSTEM
        // ============================================================================
        class Renderer {
            constructor() {
                const canvas = document.getElementById('canvas');
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x1a1a10); // True creepy dark backrooms palette
                this.scene.fog = new THREE.FogExp2(0x1a1a10, 0.03);

                this.camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                this.camera.position.set(0, 1.7, 0);

                this.gl = new THREE.WebGLRenderer({
                    canvas: canvas,
                    antialias: false,
                    powerPreference: 'high-performance'
                });
                this.gl.setSize(window.innerWidth, window.innerHeight);
                this.gl.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.gl.outputColorSpace = THREE.SRGBColorSpace;
                this.gl.shadowMap.enabled = true;

                window.addEventListener('resize', () => {
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    this.camera.aspect = w / h;
                    this.camera.updateProjectionMatrix();
                    this.gl.setSize(w, h);
                });
            }

            render() {
                this.gl.render(this.scene, this.camera);
            }
        }

        // ============================================================================
        // 2. PROCEDURAL CHUNK SYSTEM
        // ============================================================================
        class ChunkManager {
            constructor(scene) {
                this.scene = scene;
                this.chunks = new Map();
                this.loaded = new Set();
                this.chunkSize = 32;
                this.renderDist = 1; // Kept tight for claustrophobic horror performance
            }

            getKey(x, z) {
                return `${Math.floor((x + this.chunkSize/2) / this.chunkSize)},${Math.floor((z + this.chunkSize/2) / this.chunkSize)}`;
            }

            generateChunk(cx, cz) {
                const key = `${cx},${cz}`;
                if (this.chunks.has(key)) return this.chunks.get(key);

                const materials = [
                    new THREE.MeshStandardMaterial({ color: 0xcccc99, roughness: 0.8 }), // Wallpaper yellow
                    new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 }), // Acoustic tile ceiling
                    new THREE.MeshStandardMaterial({ color: 0x554433, roughness: 0.7 })  // Dirty moist carpet
                ];

                const chunk = { key, cx, cz, meshes: [] };

                const centerX = cx * this.chunkSize;
                const centerZ = cz * this.chunkSize;

                // Floor
                const floorGeo = new THREE.PlaneGeometry(this.chunkSize, this.chunkSize);
                const floorMesh = new THREE.Mesh(floorGeo, materials[2]);
                floorMesh.rotation.x = -Math.PI / 2;
                floorMesh.position.set(centerX, 0, centerZ);
                floorMesh.receiveShadow = true;
                this.scene.add(floorMesh);
                chunk.meshes.push(floorMesh);

                // Ceiling
                const ceilingGeo = new THREE.PlaneGeometry(this.chunkSize, this.chunkSize);
                const ceilingMesh = new THREE.Mesh(ceilingGeo, materials[1]);
                ceilingMesh.rotation.x = Math.PI / 2;
                ceilingMesh.position.set(centerX, 3.5, centerZ);
                this.scene.add(ceilingMesh);
                chunk.meshes.push(ceilingMesh);

                // Procedural Interior Walls inside each chunk using a fixed seed
                const rnd = new Random(Math.abs(cx * 1000 + cz));
                const wallGeo = new THREE.BoxGeometry(4, 3.5, 0.5);

                for (let i = 0; i < 8; i++) {
                    const wallMesh = new THREE.Mesh(wallGeo, materials[0]);
                    const rx = centerX + (rnd.next() - 0.5) * (this.chunkSize - 6);
                    const rz = centerZ + (rnd.next() - 0.5) * (this.chunkSize - 6);
                    wallMesh.position.set(rx, 1.75, rz);
                    if (rnd.next() > 0.5) wallMesh.rotation.y = Math.PI / 2;
                    wallMesh.castShadow = true;
                    wallMesh.receiveShadow = true;
                    this.scene.add(wallMesh);
                    chunk.meshes.push(wallMesh);
                }

                this.chunks.set(key, chunk);
                return chunk;
            }

            updateChunks(playerPos) {
                const currentKey = this.getKey(playerPos.x, playerPos.z);
                const [cx, cz] = currentKey.split(',').map(Number);

                const toLoad = [];
                const currentVisibleKeys = new Set();

                for (let dx = -this.renderDist; dx <= this.renderDist; dx++) {
                    for (let dz = -this.renderDist; dz <= this.renderDist; dz++) {
                        const k = `${cx + dx},${cz + dz}`;
                        toLoad.push([cx + dx, cz + dz]);
                        currentVisibleKeys.add(k);
                    }
                }

                // Unload out of range chunks
                this.loaded.forEach(k => {
                    if (!currentVisibleKeys.has(k)) {
                        const chunk = this.chunks.get(k);
                        if (chunk) {
                            chunk.meshes.forEach(m => this.scene.remove(m));
                        }
                        this.loaded.delete(k);
                    }
                });

                // Load new chunks
                toLoad.forEach(([nx, nz]) => {
                    const k = `${nx},${nz}`;
                    if (!this.loaded.has(k)) {
                        this.generateChunk(nx, nz);
                        this.loaded.add(k);
                    }
                });
            }
        }

        // ============================================================================
        // 3. LIGHTING SYSTEM
        // ============================================================================
        class Lighting {
            constructor(scene) {
                this.scene = scene;
                this.lights = [];

                // Subtle ambient setup
                const ambient = new THREE.AmbientLight(0x222211, 0.4);
                this.scene.add(ambient);

                // Fluorescent grid points
                const positions = [
                    [10, 3.3, 10], [-10, 3.3, 10], [10, 3.3, -10], [-10, 3.3, -10],
                    [30, 3.3, 30], [-30, 3.3, -30], [0, 3.3, 0]
                ];

                positions.forEach(pos => {
                    const light = new THREE.PointLight(0xeeeeaa, 1.2, 25);
                    light.position.set(...pos);
                    this.scene.add(light);
                    this.lights.push(light);
                });
            }

            update(time) {
                this.lights.forEach((light, i) => {
                    // Creepy asymmetric office lighting flicker
                    const flicker = Math.sin(time * 5 + i) * 0.15 + Math.cos(time * 23 + i) * 0.05 + 0.85;
                    light.intensity = (flicker > 0.75) ? 1.2 * flicker : 0.1;
                });
            }
        }

        // ============================================================================
        // 4. AUDIO SYSTEM (Fixed context trigger)
        // ============================================================================
        class AudioSystem {
            constructor() {
                this.ctx = null;
            }

            init() {
                if (this.ctx) return;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.master = this.ctx.createGain();
                    this.master.gain.value = 0.15;
                    this.master.connect(this.ctx.destination);

                    // Fluorescent Buzz Generator
                    const osc1 = this.ctx.createOscillator();
                    const osc2 = this.ctx.createOscillator();
                    const g1 = this.ctx.createGain();
                    const g2 = this.ctx.createGain();

                    osc1.frequency.value = 60; 
                    osc2.frequency.value = 120;
                    g1.gain.value = 0.4;
                    g2.gain.value = 0.2;

                    osc1.connect(g1);
                    osc2.connect(g2);
                    
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 180;
                    
                    g1.connect(filter);
                    g2.connect(filter);
                    filter.connect(this.master);

                    osc1.start();
                    osc2.start();
                } catch (e) {
                    console.warn('Audio construction failed: ', e);
                }
            }
        }

        // ============================================================================
        // 5. PHYSICS & MOVEMENT
        // ============================================================================
        class Player {
            constructor(camera, canvas) {
                this.camera = camera;
                this.canvas = canvas;
                this.pos = camera.position.clone();
                this.vel = new THREE.Vector3();
                this.keys = {};
                this.speed = 4.5;
                this.friction = 0.85;
                this.bobPhase = 0;
                this.bobSpeed = 12;

                document.addEventListener('keydown', (e) => { this.keys[e.key.toLowerCase()] = true; });
                document.addEventListener('keyup', (e) => { this.keys[e.key.toLowerCase()] = false; });

                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement === this.canvas) {
                        this.camera.rotation.order = 'YXZ';
                        this.camera.rotation.y -= e.movementX * 0.0025;
                        this.camera.rotation.x -= e.movementY * 0.0025;
                        this.camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, this.camera.rotation.x));
                    }
                });
            }

            update(dt) {
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), this.camera.rotation.y);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), this.camera.rotation.y);

                let moveDirection = new THREE.Vector3();
                if (this.keys['w']) moveDirection.add(forward);
                if (this.keys['s']) moveDirection.sub(forward);
                if (this.keys['d']) moveDirection.add(right);
                if (this.keys['a']) moveDirection.sub(right);
                moveDirection.normalize();

                this.vel.add(moveDirection.multiplyScalar(this.speed * dt * 8));
                this.vel.multiplyScalar(this.friction);
                this.pos.add(this.vel.clone().multiplyScalar(dt));

                // Head bob logic
                if (this.vel.length() > 0.1) {
                    this.bobPhase += dt * this.bobSpeed;
                    this.camera.position.y = 1.7 + Math.sin(this.bobPhase) * 0.06;
                } else {
                    this.camera.position.y = THREE.MathUtils.lerp(this.camera.position.y, 1.7, 0.1);
                }

                this.camera.position.x = this.pos.x;
                this.camera.position.z = this.pos.z;
            }
        }

        // ============================================================================
        // 6. THREAT ENTITY AI
        // ============================================================================
        class Entity {
            constructor(scene, startPos) {
                this.scene = scene;
                this.pos = startPos.clone();
                this.vel = new THREE.Vector3();
                this.state = 'idle';

                // Spooky bacteria entity mesh geometry
                const geo = new THREE.CylinderGeometry(0.2, 0.4, 2.2, 6);
                const mat = new THREE.MeshBasicMaterial({ color: 0x050505, wireframe: true });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(this.pos);
                this.scene.add(this.mesh);

                this.huntTimer = 0;
            }

            update(dt, playerPos) {
                const dist = this.pos.distanceTo(playerPos);

                if (dist < 35) {
                    this.state = 'chasing';
                    const dir = playerPos.clone().sub(this.pos).normalize();
                    dir.y = 0;
                    this.vel.copy(dir).multiplyScalar(3.2);
                } else {
                    this.state = 'hunting';
                    this.huntTimer += dt;
                    if (this.huntTimer > 3.0) {
                        this.vel.set((Math.random() - 0.5) * 1.5, 0, (Math.random() - 0.5) * 1.5);
                        this.huntTimer = 0;
                    }
                }

                this.pos.add(this.vel.clone().multiplyScalar(dt));
                this.pos.y = 1.1; // Maintain exact level floor plane alignment
                this.mesh.position.copy(this.pos);
            }
        }

        // ============================================================================
        // 7. MAIN ENGINE
        // ============================================================================
        class Engine {
            constructor() {
                this.renderer = new Renderer();
                this.chunks = new ChunkManager(this.renderer.scene);
                this.lighting = new Lighting(this.renderer.scene);
                this.audio = new AudioSystem();
                this.player = new Player(this.renderer.camera, this.renderer.gl.domElement);
                this.entities = [];
                
                this.time = 0;
                this.fps = 0;
                this.frameCount = 0;
                this.fpsTimer = 0;
                this.lastTime = performance.now();

                // Spawn nearby creepy stalker AI units
                this.entities.push(new Entity(this.renderer.scene, new THREE.Vector3(15, 1.1, -15)));
                this.entities.push(new Entity(this.renderer.scene, new THREE.Vector3(-25, 1.1, 25)));
            }

            updateUI() {
                const pos = this.player.pos;
                const chunk = this.chunks.getKey(pos.x, pos.z);
                document.getElementById('fps').textContent = `FPS: ${this.fps}`;
                document.getElementById('pos').textContent = `POS: ${pos.x.toFixed(0)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(0)}`;
                document.getElementById('chunk').textContent = `CHUNK: ${chunk}`;
                document.getElementById('entities').textContent = `ENTITIES: ${this.entities.length}`;

                if (this.entities.length > 0) {
                    let minDistance = Infinity;
                    this.entities.forEach(ent => {
                        const d = pos.distanceTo(ent.pos);
                        if(d < minDistance) minDistance = d;
                    });

                    document.getElementById('distance').textContent = `DISTANCE: ${minDistance.toFixed(1)}m`;

                    const threatEl = document.getElementById('threatLevel');
                    if (minDistance < 12) {
                        threatEl.textContent = 'THREAT: CRITICAL';
                        threatEl.style.color = '#f00';
                    } else if (minDistance < 30) {
                        threatEl.textContent = 'THREAT: HIGH';
                        threatEl.style.color = '#ff6600';
                    } else {
                        threatEl.textContent = 'THREAT: MINIMAL';
                        threatEl.style.color = '#0f0';
                    }
                }
                document.getElementById('status').textContent = 'STATUS: OPERATIONAL';
            }

            animate = () => {
                requestAnimationFrame(this.animate);

                const now = performance.now();
                let dt = (now - this.lastTime) / 1000;
                if (dt > 0.1) dt = 0.1; // Caps delta spikes to prevent crazy clipping through geometry
                this.lastTime = now;
                
                this.time += dt;
                this.frameCount++;
                this.fpsTimer += dt;

                // Safe clean structural FPS check every half-second interval
                if (this.fpsTimer >= 0.5) {
                    this.fps = Math.round(this.frameCount / this.fpsTimer);
                    this.frameCount = 0;
                    this.fpsTimer = 0;
                }

                // Systems updates loop cycle step
                this.chunks.updateChunks(this.player.pos);
                this.player.update(dt);
                this.lighting.update(this.time);

                this.entities.forEach(ent => {
                    ent.update(dt, this.player.pos);
                });

                this.updateUI();
                this.renderer.render();
            }

            start() {
                this.animate();
            }
        }

        // ============================================================================
        // SAFE BOOT INITIALIZATION
        // ============================================================================
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loading');
            
            loadingScreen.addEventListener('click', () => {
                try {
                    const engine = new Engine();
                    // Initialize browser safe Audio context post user mouse click action
                    engine.audio.init();
                    
                    // Request window pointer lock
                    engine.renderer.gl.domElement.requestPointerLock();
                    
                    // Kill Loading Screen display interface layer smoothly
                    loadingScreen.style.display = 'none';
                    
                    engine.start();
                } catch (err) {
                    document.getElementById('loadMainText').innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
                    console.error(err);
                }
            });
        });
    </script>
</body>
</html>
