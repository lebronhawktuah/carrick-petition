<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARRICK 26/27 | THE FUTURE</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --manc-red: #ff0000;
            --glow: 0 0 20px rgba(255, 0, 0, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: #030303;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Fancy Background Glow */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            width: 100%;
            height: 40%;
            background: radial-gradient(circle, rgba(218, 41, 28, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .carrick-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            letter-spacing: -4px;
            margin: 0;
            text-transform: uppercase;
            line-height: 0.85;
        }

        .stamp {
            display: inline-block;
            border: 6px solid var(--manc-red);
            padding: 10px 40px;
            color: var(--manc-red);
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            transform: rotate(-6deg);
            box-shadow: var(--glow);
            margin-top: 20px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.5);
        }

        /* The Petition Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            max-width: 600px;
            padding: 50px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #counter {
            font-size: clamp(4rem, 12vw, 6.5rem);
            font-weight: 900;
            letter-spacing: -5px;
            margin: 0;
            line-height: 1;
        }

        .label {
            color: #666;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin: 15px 0 35px;
            text-transform: uppercase;
        }

        .bar-container { width: 100%; margin-top: 10px; }
        .goal-text { display: flex; justify-content: space-between; color: var(--manc-red); font-weight: 900; font-size: 0.8rem; margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 10px; background: #111; border-radius: 20px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--manc-red); width: 0%; box-shadow: var(--glow); transition: width 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* The Button */
        .btn {
            width: 100%;
            max-width: 600px;
            background: var(--manc-red);
            color: white;
            border: none;
            padding: 25px;
            font-size: 1.5rem;
            font-weight: 900;
            margin-top: 30px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255, 0, 0, 0.5); }
        .btn.signed { background: #111; color: #444; cursor: default; transform: none; box-shadow: none; }

        /* Live Bot Comments */
        .live-feed {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 20px;
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .feed-title { font-size: 0.7rem; font-weight: 900; color: #444; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; text-align: center;}
        
        .comment {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .bot-name { color: var(--manc-red); font-weight: 800; }
        .bot-msg { color: #ccc; }

        .footer { margin-top: 50px; color: #222; font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="carrick-title">CARRICK</h1>
        <div class="stamp">STAY 26/27</div>
    </div>

    <div class="card">
        <h2 id="counter">0</h2>
        <div class="label">MANCUNIANS UNITED</div>

        <div class="bar-container">
            <div class="goal-text">
                <span>PROGRESS</span>
                <span>150,000 GOAL</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill" id="progress"></div>
            </div>
        </div>
    </div>

    <button id="signBtn" class="btn">Sign the Petition</button>

    <div class="live-feed" id="feed">
        <div class="feed-title">LIVE ACTIVITY FEED</div>
        <div id="comment-list"></div>
    </div>

    <div class="footer">#GGMU • NO BACKWARDS STEPS</div>

    <script>
        const goal = 150000;
        const countEl = document.getElementById('counter');
        const barEl = document.getElementById('progress');
        const btn = document.getElementById('signBtn');
        const commentList = document.getElementById('comment-list');

        // 1. DYNAMIC PERSISTENT COUNTER (Goes fast!)
        // Based on time since launch, jumps by 200+ on refresh
        const startTime = new Date("May 6, 2026 08:00:00").getTime();
        
        function getLiveCount() {
            const now = new Date().getTime();
            const elapsedSeconds = (now - startTime) / 1000;
            // Base 95k + 15 signs per second (Roughly 900 per minute jump)
            let current = 95240 + (elapsedSeconds * 15.5);
            return Math.min(current, goal);
        }

        let currentCount = getLiveCount();

        function updateUI() {
            countEl.innerText = Math.floor(currentCount).toLocaleString();
            let percent = (currentCount / goal) * 100;
            barEl.style.width = percent + "%";
        }

        // Fast update while on page
        setInterval(() => {
            if (currentCount < goal) {
                currentCount += (Math.random() * 2);
                updateUI();
            }
        }, 150);

        // 2. BOT COMMENT LOGIC
        const botNames = ["UtdXtra", "MancBorn", "RedDevil99", "SirAlexVibe", "CarrickBall", "TheStretfordEnd", "BrunoFan", "TenHagLegacy", "OldTraffordKing"];
        const botMsgs = ["Signed! He's the one.", "Don't let him leave.", "The DNA is back.", "Keep the progress going!", "Carrick in 26/27!", "Best manager since SAF.", "We can't go back now.", "Signed from Manchester!", "Get it done Board."];

        function addComment() {
            const name = botNames[Math.floor(Math.random() * botNames.length)];
            const msg = botMsgs[Math.floor(Math.random() * botMsgs.length)];
            
            const div = document.createElement('div');
            div.className = 'comment';
            div.innerHTML = `<span class="bot-name">${name}</span> <span class="bot-msg">${msg}</span>`;
            
            commentList.prepend(div);
            if (commentList.children.length > 5) {
                commentList.removeChild(commentList.lastChild);
            }
        }

        // Bots comment every 1-3 seconds
        setInterval(addComment, 2500);

        btn.addEventListener('click', () => {
            if (!btn.classList.contains('signed')) {
                btn.innerText = "SIGNING...";
                setTimeout(() => {
                    currentCount += 250; 
                    updateUI();
                    btn.innerText = "ALREADY SIGNED";
                    btn.classList.add('signed');
                    localStorage.setItem('carrick_signed', 'true');
                    
                    const myDiv = document.createElement('div');
                    myDiv.className = 'comment';
                    myDiv.innerHTML = `<span class="bot-name" style="color:#fff">YOU</span> <span class="bot-msg">JUST SIGNED THE PETITION!</span>`;
                    commentList.prepend(myDiv);
                }, 1000);
            }
        });

        if (localStorage.getItem('carrick_signed')) {
            btn.innerText = "ALREADY SIGNED";
            btn.classList.add('signed');
        }

        updateUI();
        for(let i=0; i<3; i++) addComment(); // Pre-load some comments
    </script>
</body>
</html>
